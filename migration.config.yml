profile: balanced
rate_limit:
  source_rpm: 35
  target_rpm: 40
  heavy_rpm: 8
batch_size: 100
chunk_size: 500
retry_policy:
  max_retries: 3
  base_delay_ms: 200
  max_delay_ms: 2000
parallel_workers: 2
storage:
  path: .prototype/migration.sqlite
user_policy:
  cutoff_date: 2024-01-01T00:00:00+00:00
  inactive_strategy: transfer_tasks_to_system_user
  system_user_id: system
