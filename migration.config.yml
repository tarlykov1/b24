profile: balanced
execution_mode: execute
rate_limit:
  source_rpm: 35
  target_rpm: 40
  heavy_rpm: 8
batch_size: 100
chunk_size: 500
retry_policy:
  max_retries: 3
  base_delay_ms: 200
  max_delay_ms: 2000
parallel_workers: 2
runtime:
  max_requests_per_second: 10
id_preservation_policy: preserve_if_possible
verification_level: 3
file_transfer_policy: staged_resume
cutoff_policy: strict
throttling_policy: conservative
maintenance_window_policy: business_hours_safe
storage:
  driver: mysql
  host: 127.0.0.1
  port: 3306
  name: bitrix_migration
  user: migration_user
  password: change_me
  charset: utf8mb4
  collation: utf8mb4_unicode_ci
source_db:
  dsn: ''
  user: ''
  password: ''
target_db:
  dsn: ''
  user: ''
  password: ''
source_filesystem_root: ''
target_filesystem_root: ''
source_rest:
  url: ''
  token: ''
target_rest:
  url: ''
  token: ''
user_policy:
  cutoff_date: 2024-01-01T00:00:00+00:00
  inactive_strategy: transfer_tasks_to_system_user
  system_user_id: system
sync:
  mode: hybrid
  direction: source_to_target
  window:
    start: '01:00'
    end: '05:00'
    timezone: UTC
    low_load_days: ['sat', 'sun']
  policy:
    users: enabled
    tasks: enabled
    crm: enabled
    files: partial
    comments: disabled
    activity_logs: enabled
  filters:
    tasks.project: ACTIVE_PROJECTS
    users.last_active_after: '2024-01-01'
